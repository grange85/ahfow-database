title: The Turnaround
slug: the-turnaround
sort_title: TURNAROUND
authors: Krukowski/Yang
lyrics: 'Up all night

  Just to feel the breeze

  An attic room

  Closed for centuries

  The turnaround

  The change of key

  The open door

  You gave to me

  A dusty book

  With tipped-in plates

  Brushes dipped

  In fresh white paint

  An open door

  Might lead you

  A million miles away

  But this heart will stay

  Beside you'
