title: Words Without Wrinkles
slug: words-without-wrinkles
sort_title: WORDS WITHOUT WRINKLES
lyrics: 'Will you stand trial

  For crimes against the mind

  Don''t contradict yourself

  Not today

  Quickly fetch the lawyer

  You haven''t long to live

  Words without wrinkles

  Will hurt the most

  Get your story straight

  I heard them say

  Quickly fetch the lawyer

  You''ve nothin left to give


  Go to the window

  Make love to the wind

  Concentrate and listen

  This is the end...


  A tear filled eye

  Raised to the sky

  You want us all to notice

  We got no choice

  Listen can you hear me

  You''re going home

  Your dopamine receptors

  Are shot to hell

  Your thoughts are spongy

  You don''t seem well

  Listen can you hear me?

  You''re going home'
