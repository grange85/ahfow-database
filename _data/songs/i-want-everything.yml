title: I Want Everything
slug: i-want-everything
sort_title: I WANT EVERYTHING
lyrics: 'Hey girl, sweet thing

  I want everything

  You love me too

  And I want you


  Well I think I''m gonna

  Jump right through your window

  And I think I''m gonna

  Jump into your life


  Cause you got me in a bad situation

  And I want you


  Well the TV says that

  Love is all around us

  And the astronauts

  Can feel it far away


  But it''s got me in a bad situation

  And I want you


  Yeah I think I''m gonna

  Take a short vacation

  And I think we''re gonna

  Have to start anew


  Cause you got me in a bad situation

  And I want you'
