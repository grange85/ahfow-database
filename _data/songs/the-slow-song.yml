title: The Slow Song
slug: the-slow-song
sort_title: SLOW SONG
lyrics: 'durch Strassen bevoikert

  wir laufen breit

  wir sind zufrieden

  die Nacht ist schon


  wenn du im Halbschlaf bist, in Wunderland

  und einst von mir entfernt bist

  schau in den Himmel

  die Engelshande saen Senfkomer des Wahnsinns


  schau auf die Uhr

  ich muss zu Bett

  wir tanzen zusammen

  to the Tennesse Waltz'
