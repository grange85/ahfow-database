title: Decomposing Trees
slug: decomposing-trees
sort_title: DECOMPOSING TREES
authors: Krukowski/Wareham/Yang
lyrics: 'My toes can talk

  And they''re smiling at me

  Calm down they say

  Not afraid anymore


  And they talk to me

  And they smile at me


  I walked upstream

  And I sat in the mud

  Life starts again

  Watching trees decompose


  And they talk to me

  And they smile at me'
