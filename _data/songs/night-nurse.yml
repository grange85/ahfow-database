  I am a tourist in a summer dress

  I am the night nurse, I am the most

  I am the visitor, you are the host


  Chorus again


  My wings are clipped

  My drinks are sipped

  My lips are lipped

  My lid is flipped


  I am the night nurse

  I am the most

  I am the visitor

  You are the host


  Chorus'
