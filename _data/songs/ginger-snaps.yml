title: Ginger Snaps
slug: ginger-snaps
sort_title: GINGER SNAPS
lyrics: 'When the cowboy sings

  When the Saturn rings

  When the ginger snaps

  When the thunder claps


  You can cut my hair

  You can fill my cup

  You can tell me lies

  You can make it up

  We''re gonna make it after all


  I don''t need to know who''s right or wrong

  It''s not a crime to change your mind


  When the kitchen sinks

  When the sugar winks

  When the doctor calls

  When Niagara falls


  I''m a wayward Tom

  I''m a silver streak

  And the walls have ears

  But the walls don''t speak

  We''re gonna make it after all


  I don''t need to know who''s right or wrong

  It''s not a crime to change your mind


  Don''t need to know

  Don''t need to know........'
