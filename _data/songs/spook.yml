title: Spook
slug: spook
sort_title: SPOOK
authors: Krukowski/Wareham/Yang
lyrics: 'When you went blind

  Then I nearly lost my mind

  It didn''t last

  Cause you have another eyelid


  And when you smile

  Then you give yourself away

  It''s all too much

  And you have another eyelid


  But when you cry

  Then I know we are in trouble

  It''s all too much

  And you have another eyelid'
