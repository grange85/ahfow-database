title: We're Both Confused
slug: were-both-confused
sort_title: WERE BOTH CONFUSED
lyrics: 'Things I did

  Haunt me still

  Follow me around

  Like they know the way


  Things she said

  Linger on

  Hanging in the air

  And they will not go away


  I thought I knew her game

  I miss her just the same


  Thought I knew

  What to do

  She broke my window pane

  But she said I couldn''t prove


  I look at my dog

  We''re both confused

  I love September best

  And I feel like I should move


  I thought I knew her game

  I miss her just the same'
