title: Ceremony
slug: ceremony
sort_title: CEREMONY
authors: Joy Division
original_artist: Joy Division
originals_url: https://www.fullofwishes.co.uk/2013/04/03/originals-ceremony-by-joy-division-covered-by-galaxie-500/
lyrics: 'This is why ...

  Heard it all a different story

  All the time the wheels are turning

  Turn again, turn towards this time

  All she asks, the strength to hold me

  ... the same old story

  Love will travel oh so quickly

  Travel fast, turn towards this time

  I ... them all, no mercy shown

  Heaven knows it''s got to be this time

  What she heard, these things she said

  Time she cried and failed to wake this time

  I break them down, no mercy shown

  Heaven knows it''s got to be this time

  Avenues all lined with trees

  Picture me and then you start watching

  Avenues all lined with trees

  Picture me and then you start watching

  Avenues all lined with trees

  Picture me and then you start watching

  Forever

  Forever watch ...

  Forever

  For never letting me know'
is_cover: true
