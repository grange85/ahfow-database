title: Bewitched
slug: bewitched
sort_title: BEWITCHED
lyrics: 'all of a sudden

  the girl of my dreams

  she never asks

  she always screams

  do you see her face

  in a puddle at my feet

  as i bend down

  to kiss the street


  and i''ll come runnin'' to her

  and i''ll come runnin'' to her


  her sleep is troubled

  her face will twitch

  she wakes up angry

  and i''m bewitched

  her smile is forced

  she''s always late

  but she''s not sorry

  and i capitulate


  and i''ll come runnin'' to her

  and i''ll come runnin'' to her


  all of a sudden

  the girl of my dreams

  she never asks

  she always screams'
