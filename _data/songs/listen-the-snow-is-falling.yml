title: Listen, the Snow Is Falling
slug: listen-the-snow-is-falling
sort_title: LISTEN THE SNOW IS FALLING
authors: Yoko Ono
original_artist: Ono, Yoko
originals_url: https://www.fullofwishes.co.uk/2013/12/04/originals-listen-the-snow-is-falling-by-yoko-ono-and-the-plastic-ono-band-covered-by-galaxie-500/
lyrics: 'Listen, the Snow Is Falling over town

  Listen, the Snow Is Falling everywhere

  Between Empire State Building

  And between Trafalgar Square

  Listen, the Snow Is Falling over town


  Listen, the Snow Is Falling over town

  Listen, the Snow Is Falling everywhere

  Between your bed and mine

  Between your head and my mind

  Listen, the Snow Is Falling over town


  Between Tokyo and Paris

  Between London and Dallas

  Between your God and mine

  Listen, the Snow Is Falling everywhere


  Snow dream

  Snow fall

  Snow fly

  Listen

  Listen'
is_cover: true
