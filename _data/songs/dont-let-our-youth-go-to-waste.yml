title: Don't Let Our Youth Go to Waste
slug: dont-let-our-youth-go-to-waste
sort_title: DONT LET OUR YOUTH GO TO WASTE
authors: Jonathan Richman
original_artist: Richman, Jonathan (and the Modern Lovers)
originals_url: https://www.fullofwishes.co.uk/2013/05/15/originals-dont-let-our-youth-go-to-waste-by-jonathan-richman-covered-by-galaxie-500/
lyrics: 'I need a walk by the flowers with someone who can share my face

  Looks like nobody could take your place

  And I could bleed in sympathy with you

  On those days

  And I could drink up everything you have

  Don''t let it go to waste

  I could show you memories

  To rival Berlin in the Thirties

  I understand your dating bar ways

  And I could bleed in sympathy with you

  On those days

  And I could drink up everything you have

  Don''t let it go to waste

  Say something warm, say something nice

  I can''t to see you when you''re cold

  Nor can I stand being out of your life

  And I could bleed in sympathy with you

  On those days

  And I could drink up everything you have

  Don''t let our youth go to waste'
is_cover: true
