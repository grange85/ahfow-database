notes: 'Exposed: Songs for Unseen Warhol FilmsCreated in celebration of the Andy Warhol
  Museum\''s 20th Anniversary, this multimedia performance event unveils 15 never-before-seen
  1960s films captured by Andy Warhol, featuring Marcel Duchamp, Edie Sedgwick, Donovan,
  Warhol himself, and others.Five songwriter-composers who reflect the generational
  trajectory and musical influence of post-Velvet Underground 70s to today — Guest
  Music Curator Dean Wareham (Galaxie 500, Luna), Tom Verlaine (Television), Martin
  Rev (Suicide), Eleanor Friedberger (the Fiery Furnaces), and Bradford Cox (Deerhunter)—perform
  live original scores to these unseen celluloid gems from one of America''s most
  iconic art-makers. This work was commissioned by The Warhol Museum, The Brooklyn
  Academy of Music''s 2014 Next Wave Festival and Center for the Art of Performance
  at UCLA.'
